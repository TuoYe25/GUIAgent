# Edge GUI Agent — Model Configurations

# UI-TARS (ByteDance)
# https://github.com/bytedance/ui-tars

ui-tars-1.5-7b:
  model:
    name: "UI-TARS-1.5-7B"
    repo_id: "bytedance/UI-TARS-1.5-7B"
    framework: transformers
    approach: coordinate_based
    parameters: "7B"
    gpu_memory_gb: 8
    recommended_backend: vllm
  pipeline:
    max_new_tokens: 256
    temperature: 0.0
    image_size: [1920, 1080]
  supported_actions:
    - click
    - double_click
    - right_click
    - type
    - scroll
    - hover
    - drag
    - press

